name: Robot Framework Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Robocop Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Robocop
        run: robocop .

  validate:
    name: "Validate (${{ matrix.target_app }} / ${{ matrix.environment }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        target_app: [SwagLabs, ChallengingDom]
        environment: [Dev, Staging, UAT]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate YAML registries
        run: python Settings/YamlValidator.py ${{ matrix.target_app }} ${{ matrix.environment }}

  test:
    name: "${{ matrix.target_app }} Tests"
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        target_app: [SwagLabs, ChallengingDom]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: rfbrowser init

      - name: Run Robot Framework tests
        run: |
          robot \
            --variable headless:True \
            --variable target_app:${{ matrix.target_app }} \
            --include ${{ matrix.target_app }} \
            --outputdir Tests/Reports/${{ matrix.target_app }} \
            --xunit Reports.xml \
            . || echo "ROBOT_FAILED=true" >> "$GITHUB_ENV"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ matrix.target_app }}
          path: Tests/Reports/${{ matrix.target_app }}/
          retention-days: 14

      - name: Assert tests passed
        if: always()
        run: |
          if [ "$ROBOT_FAILED" = "true" ]; then
            echo "Tests failed — see uploaded artifact for details"
            exit 1
          fi
